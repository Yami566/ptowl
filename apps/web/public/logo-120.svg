<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E20;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="#FF7043" stroke-width="3"/>
  <!-- Owl body -->
  <ellipse cx="60" cy="68" rx="32" ry="35" fill="#E8F5E9" opacity="0.95"/>
  <!-- Left eye circle -->
  <circle cx="46" cy="52" r="14" fill="white" stroke="#1B5E20" stroke-width="2"/>
  <!-- Right eye circle -->
  <circle cx="74" cy="52" r="14" fill="white" stroke="#1B5E20" stroke-width="2"/>
  <!-- Left pupil -->
  <circle cx="48" cy="51" r="7" fill="#1B5E20"/>
  <circle cx="50" cy="49" r="2.5" fill="white"/>
  <!-- Right pupil -->
  <circle cx="76" cy="51" r="7" fill="#1B5E20"/>
  <circle cx="78" cy="49" r="2.5" fill="white"/>
  <!-- Beak -->
  <polygon points="60,60 54,68 66,68" fill="#FF7043"/>
  <!-- Ear tufts -->
  <polygon points="35,35 40,22 48,38" fill="#E8F5E9" opacity="0.9"/>
  <polygon points="85,35 80,22 72,38" fill="#E8F5E9" opacity="0.9"/>
  <!-- Chest pattern -->
  <ellipse cx="60" cy="82" rx="16" ry="14" fill="#C8E6C9" opacity="0.6"/>
  <!-- Feet -->
  <ellipse cx="50" cy="100" rx="8" ry="3" fill="#FF7043" opacity="0.8"/>
  <ellipse cx="70" cy="100" rx="8" ry="3" fill="#FF7043" opacity="0.8"/>
  <!-- PT text -->
  <text x="60" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="11" fill="white" letter-spacing="1">PTOWL</text>
</svg>
