<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Built for therapy clinics — PT, OT, SLP, chiropractic, mental-health, and dental hygiene. Create and print recurring patient schedules in 5 keypresses. No PHI stored. Free during beta." />
    <title>PTOwl — Recurring patient schedules in 5 keypresses</title>

    <!-- Favicon & PWA -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="canonical" href="https://ptowl.com/" />
    <meta name="theme-color" content="#1B5E20" />
    <meta name="color-scheme" content="light dark" />

    <!-- iOS PWA — "Add to Home Screen" -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PTOwl" />
    <link rel="apple-touch-icon" href="/logo-120.svg" />

    <!-- Microsoft tiles (Windows pinned site) -->
    <meta name="application-name" content="PTOwl — Patience Trainer" />
    <meta name="msapplication-TileColor" content="#1B5E20" />

    <!-- Open Graph / Social — used by iMessage, Slack, WhatsApp, FB, etc.
         Apple Messages caches link previews aggressively (~7 days, per
         device + iCloud LP service). If the preview shows no image after
         updating these tags, share with a cache-busting query string
         like https://ptowl.com/?v=2 to force a fresh fetch. -->
    <meta property="og:site_name" content="PTOwl" />
    <meta property="og:title" content="PTOwl — Recurring patient schedules in 5 keypresses" />
    <meta property="og:description" content="Built for therapy clinics — PT, OT, SLP, chiropractic, mental-health, and dental hygiene. No PHI stored. Free during beta." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ptowl.com/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://ptowl.com/og-image.png" />
    <meta property="og:image:secure_url" content="https://ptowl.com/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="PTOwl wordmark on a green background — recurring patient schedules in 5 keypresses for therapy clinics (PT, OT, SLP, chiro, mental-health, dental hygiene)" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PTOwl — Recurring patient schedules in 5 keypresses" />
    <meta name="twitter:description" content="Built for therapy clinics — PT, OT, SLP, chiropractic, mental-health, and dental hygiene. No PHI stored. Free during beta." />
    <meta name="twitter:image" content="https://ptowl.com/og-image.png" />
    <meta name="twitter:image:alt" content="PTOwl — recurring patient schedules in 5 keypresses for therapy clinics" />

    <!-- Older crawlers (some chat apps still use this) -->
    <link rel="image_src" href="https://ptowl.com/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <noscript>
      <div style="padding: 24px; font-family: system-ui, sans-serif; color: #1B5E20; text-align: center;">
        PTOwl needs JavaScript. If you&apos;re viewing this from inside an in-app browser
        (Messages, Mail, etc.), tap the Share icon and choose "Open in Safari".
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!--
      Cloudflare Web Analytics — belt-and-suspenders.
      ────────────────────────────────────────────────
      Two paths converge on the same beacon:
        1. Dashboard auto-insert: Cloudflare → Workers & Pages → ptowl →
           Web Analytics → Enable. Privacy-friendly, no cookies, no
           GDPR banner.
        2. Explicit script tag below — fires regardless of dashboard
           setting, important for SPA route changes that auto-insert
           sometimes misses.

      The token is PUBLIC (renders in HTML for the browser to read) — safe
      to commit once filled in. Get it from CF dashboard → Web Analytics
      → ptowl.com → site token. Until then the placeholder no-ops.
    -->
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js"
            data-cf-beacon='{"token": "__CF_ANALYTICS_TOKEN__"}'></script>

    <!--
      Tawk.to chat removed: the inline loader was blocked by the strict
      production CSP (`script-src 'self' …` with no `'unsafe-inline'`),
      so the widget was silently non-functional. Re-add via Cloudflare
      Zaraz custom HTML (see docs/BUILD.md → Subprocessors) if/when chat
      is needed — Zaraz proxies the script through the same origin so no
      CSP allow-list change is required.
    -->
  </body>
</html>
