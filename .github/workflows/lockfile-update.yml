name: Update pnpm-lock.yaml

# Workflow_dispatch helper. Runs pnpm install with --no-frozen-lockfile
# so it can regenerate the lockfile after deps were added directly to
# package.json (typical when there is no local Node toolchain). Commits
# the resulting lockfile back to the SAME branch the workflow was
# dispatched against so Cloudflare Workers Builds (which uses
# frozen-lockfile semantics) can install cleanly on subsequent pushes.
#
# Push target = the workflow's caller ref. Triggering against `main` is
# blocked by branch protection (PR-required); use a feature branch and
# the workflow commits the lockfile change to that branch, after which
# you open a PR. Aligns with the OPERATING.md Tier 2 PR-flow rule.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history so the bot push doesn't fight with main's tip.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Force clean lockfile regen
        # `pnpm install --no-frozen-lockfile` adds missing deps but does
        # not reliably remove orphaned entries when deps are deleted from
        # package.json. Deleting the lockfile first forces a fresh
        # resolve from package.json, guaranteeing the lockfile matches
        # exactly. Workspace + transitive resolution is deterministic so
        # version drift is minimal.
        run: |
          rm -f pnpm-lock.yaml
          pnpm install --no-frozen-lockfile

      - name: Commit lockfile if changed
        run: |
          if git diff --quiet pnpm-lock.yaml; then
            echo "No lockfile changes -- nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: regenerate pnpm-lock.yaml after dep changes"
          git push origin HEAD:${{ github.ref_name }}
