name: Cloudflare bootstrap (one-shot edge config)

# One-off automation that turns on edge security + observability primitives
# via the Cloudflare API instead of the dashboard. Reuses the existing
# CLOUDFLARE_API_TOKEN secret. Re-running is idempotent for the items it
# touches (WAF managed ruleset, Bot Fight Mode, Worker errors notification,
# Web Analytics site).
#
# Required token scopes (edit the existing token, do NOT rotate):
#   - Zone        WAF              Edit       (WAF + Rate Limiting)
#   - Zone        Zone Settings    Edit       (Bot Fight Mode)
#   - Account     Notifications    Edit       (Worker Errors alerts)
#   - Account     Web Analytics    Edit       (RUM site)
#   - Zone        DNS              Edit       (branded sender DNS later)

on:
  workflow_dispatch:
    inputs:
      notify_email:
        description: Email address to receive Worker Errors alerts
        required: true
        default: nurelimusabay@gmail.com
  # Auto-trigger when the marker file at .github/cf-bootstrap-trigger.txt
  # is touched. Lets a non-clicking caller (e.g. an automated assistant
  # without dashboard access) fire the bootstrap by editing/pushing
  # that file. Idempotent — safe to re-run.
  push:
    branches: [main]
    paths:
      - .github/cf-bootstrap-trigger.txt

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ZONE_NAME: ptowl.com
      # `inputs.notify_email` is only set on workflow_dispatch; on push
      # triggers we fall back to the founder address baked here.
      NOTIFY_EMAIL: ${{ inputs.notify_email || 'nurelimusabay@gmail.com' }}
    steps:
      - name: Resolve zone id
        id: zone
        run: |
          ZID=$(curl -sf -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=$ZONE_NAME" \
            | jq -r '.result[0].id')
          if [ -z "$ZID" ] || [ "$ZID" = "null" ]; then
            echo "ERROR: could not resolve zone id for $ZONE_NAME"
            exit 1
          fi
          echo "zone_id=$ZID" >> "$GITHUB_OUTPUT"
          echo "Resolved $ZONE_NAME -> $ZID"

      - name: Enable WAF Free Managed Ruleset
        run: |
          ZID="${{ steps.zone.outputs.zone_id }}"
          # CF's Free Managed Ruleset has a fixed ID across all accounts.
          FREE_RULESET_ID=4814384a9e5d4991b9815dcfc25d2f1f
          # Replace the http_request_firewall_managed entry-point ruleset
          # to deploy the free managed ruleset on every request.
          BODY=$(jq -n --arg rid "$FREE_RULESET_ID" '{
            rules: [{
              action: "execute",
              expression: "true",
              description: "Cloudflare Free Managed Ruleset",
              action_parameters: { id: $rid, version: "latest" }
            }]
          }')
          curl -sf -X PUT \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$BODY" \
            "https://api.cloudflare.com/client/v4/zones/$ZID/rulesets/phases/http_request_firewall_managed/entrypoint" \
            | jq -r '.success, .result.id'
          echo "WAF Free Managed Ruleset ON"

      - name: Enable Bot Fight Mode
        run: |
          ZID="${{ steps.zone.outputs.zone_id }}"
          curl -sf -X PUT \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"fight_mode": true}' \
            "https://api.cloudflare.com/client/v4/zones/$ZID/bot_management" \
            | jq -r '.success'
          echo "Bot Fight Mode ON"

      - name: Create Rate Limiting rule on /api/*
        run: |
          ZID="${{ steps.zone.outputs.zone_id }}"
          BODY=$(jq -n '{
            rules: [{
              action: "block",
              ratelimit: {
                characteristics: ["cf.colo.id", "ip.src"],
                period: 60,
                requests_per_period: 100,
                mitigation_timeout: 600
              },
              expression: "(starts_with(http.request.uri.path, \"/api/\"))",
              description: "ptowl-api-burst-protection (100 req/min/IP, block 10 min)"
            }]
          }')
          curl -sf -X PUT \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$BODY" \
            "https://api.cloudflare.com/client/v4/zones/$ZID/rulesets/phases/http_ratelimit/entrypoint" \
            | jq -r '.success, .result.id'
          echo "Rate Limiting on /api/* ON (100 req/min per IP)"

      - name: Create Worker Errors notification policy
        run: |
          BODY=$(jq -n --arg email "$NOTIFY_EMAIL" '{
            name: "PTowl Worker Errors",
            description: "Alert when the API Worker throws errors",
            enabled: true,
            alert_type: "workers_alert",
            mechanisms: {
              email: [{ id: $email }]
            },
            filters: {}
          }')
          # POST is idempotent enough — if a duplicate is created, user can
          # delete via dashboard. Retrieving the existing list to dedupe is
          # extra plumbing not worth it for a one-off.
          curl -sf -X POST \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$BODY" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/alerting/v3/policies" \
            | jq -r '.success, .result.id' || echo "  (notification policy creation: see error above; may require manual dashboard step)"
          echo "Worker Errors notification policy attempted"

      - name: Create Web Analytics site
        run: |
          BODY=$(jq -n --arg host "$ZONE_NAME" '{
            host: $host,
            auto_install: true
          }')
          curl -sf -X POST \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$BODY" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/rum/site_info" \
            | jq -r '.success, .result.site_tag' || echo "  (web analytics site creation: see error above)"
          echo "Web Analytics site attempted"

      - name: Done
        run: |
          echo "Bootstrap complete. Verify in the dashboard:"
          echo "  - Security -> WAF -> Managed rules: Cloudflare Free Managed Ruleset = ON"
          echo "  - Security -> Bots -> Bot Fight Mode = ON"
          echo "  - Security -> WAF -> Rate Limiting Rules: api-burst-protection present"
          echo "  - Notifications -> PTowl Worker Errors policy present"
          echo "  - Analytics -> Web Analytics: ptowl.com site present"
