name: Launch Finalize (one-click dashboard automation)

# Manual trigger only. Runs the existing scripts/finalize-launch.mjs
# automation that performs all the dashboard tasks with programmatic
# APIs:
#   • Cloudflare Web Analytics → enable + extract token + patch index.html
#   • Clerk Account Portal → PATCH sign-in / sign-up / after-* URLs
#   • MailChannels DNS records → SPF / DKIM / Domain Lockdown (optional)
#
# If apps/web/index.html gets patched (real CF Web Analytics token
# replacing the __CF_ANALYTICS_TOKEN__ placeholder), the workflow
# auto-opens a PR with the change so it lands via the normal
# review-and-deploy flow.
#
# Required GitHub Actions secrets:
#   • CLOUDFLARE_API_TOKEN     — existing. Needs Account:Web Analytics
#                                Edit scope for full functionality.
#                                If the existing token lacks scope, the
#                                Web Analytics step fails with a clear
#                                error (other steps still run).
#   • CLOUDFLARE_ACCOUNT_ID    — existing.
#   • CLERK_SECRET_KEY         — NEW. Add via GH repo Settings →
#                                Secrets and variables → Actions →
#                                New repository secret. Optional; if
#                                unset, the Clerk-paths step is
#                                skipped. Value: sk_live_... from
#                                dashboard.clerk.com → API Keys.
#
# Usage:
#   GitHub web UI → Actions → "Launch Finalize" → Run workflow → main
#   OR: gh workflow run launch-finalize.yml

on:
  workflow_dispatch:

permissions:
  contents: write # allow committing the patched index.html on a feature branch
  pull-requests: write # allow opening a PR from the workflow

concurrency:
  group: launch-finalize
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run launch finalize script
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          # CLOUDFLARE_ZONE_ID + MAILCHANNELS_DKIM_PUBLIC_KEY intentionally
          # omitted — the DNS-records step is skipped when DKIM key is
          # not set. MailChannels rotation is dashboard-only anyway.
        run: pnpm launch:finalize

      - name: Detect file changes
        id: diff
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✓ No file changes — Clerk paths and DNS were the only mutations. Skipping PR."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "▶ Files changed:"
            git status --short
          fi

      - name: Open PR with patched index.html
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="ops/finalize-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore(analytics): apply launch-finalize patch from workflow"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore(analytics): launch-finalize workflow output" \
            --body "Auto-generated by [.github/workflows/launch-finalize.yml](.github/workflows/launch-finalize.yml). Captures the file mutations from the latest \`pnpm launch:finalize\` run (typically the CF Web Analytics token replacing the \`__CF_ANALYTICS_TOKEN__\` placeholder in \`apps/web/index.html\`). Merge to deploy."
