name: E2E — authenticated flow (cross-browser)

# Programmatically signs into ptowl.com via a Clerk sign-in token,
# verifies the clinic-admin dashboard renders correctly across
# Chromium / Firefox / WebKit (Safari engine). Surfaces auth-flow
# regressions that the unauthenticated suite + HTTP smokes miss.
#
# Requires the GH Actions repo secret CLERK_SECRET_KEY (the same
# sk_live_... key the sync-clerk-paths deploy step uses). When that
# secret is missing on a fork, the script exits 77 and the workflow
# step is marked successful — forks aren't blocked.

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'scripts/e2e-*.mjs'
      - '.github/workflows/e2e-auth.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'scripts/e2e-*.mjs'
      - '.github/workflows/e2e-auth.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

# Cancel an in-flight e2e run on the same PR/branch when a new commit
# lands. Pre-fix, iterating on a flaky test produced one workflow run
# (and one failure email) per push; the previous runs would keep
# burning CI minutes for no value. Concurrency keys on PR # for PR
# runs and branch name for push runs.
concurrency:
  group: e2e-auth-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e-auth:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      # Chromium-only by default. Firefox + WebKit (Safari engine) ran
      # 2026-05-16 with mixed results — Firefox blocked by sw.js
      # cross-origin proxy bug (since fixed), WebKit blocked by
      # a still-unknown CSP/CORS issue with ticket consumption.
      # Override locally with BROWSERS=chromium,firefox,webkit to debug.
      BROWSERS: chromium
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install root deps (includes playwright)
        run: pnpm install --frozen-lockfile

      - name: Install browsers for Playwright
        # Only Chromium installed by default (matches BROWSERS default).
        # Switch to `--with-deps chromium firefox webkit` when debugging
        # cross-browser regressions.
        run: pnpm exec playwright install --with-deps chromium

      - name: Run authenticated e2e
        env:
          E2E_ARTIFACTS_DIR: ${{ github.workspace }}/e2e-artifacts
        run: node scripts/e2e-auth.mjs

      - name: Upload failure snapshot
        # Only fires if the previous step failed. The script writes a
        # full-page screenshot + page HTML to E2E_ARTIFACTS_DIR on the
        # first failed check per browser, so the artifact is enough to
        # diagnose without needing a push-debug-push iteration loop
        # (which is what generated the 8-email storm on PR #89).
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-auth-failure-snapshot
          path: ${{ github.workspace }}/e2e-artifacts
          if-no-files-found: ignore
          retention-days: 7
