name: Deploy PtOwl (API + D1 + Frontend)

# Frontend deploy was originally delegated to Cloudflare Workers Builds (the
# git-integrated successor to CF Pages projects). On 2026-05-05 that
# integration started failing with `wrangler` not finding the assets dir
# despite a valid apps/web/wrangler.jsonc. Rather than rely on dashboard
# config we don't fully control, we now deploy the frontend from this
# workflow too, using the same `CLOUDFLARE_API_TOKEN` we already trust for
# API + D1. CF Workers Builds may continue to run in parallel; whichever
# pushes last wins and both target the same `ptowl` Worker, so this is
# safe to leave alongside the existing dashboard integration.
#
# Build + typecheck + test gate every wrangler step so deploys never fire
# on broken code.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://ptowl.com

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Self-gating: each of these steps fails the workflow if the
      # corresponding check fails, so wrangler never deploys broken code.
      - name: Typecheck (all workspaces)
        run: pnpm -r typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Build
        run: pnpm build

      # Token scope check — fails the deploy fast if the
      # CLOUDFLARE_API_TOKEN has lost its D1 Edit permission (e.g. on
      # rotation). Without this guard, the migration step below would
      # error out but the API deploy could still partial-succeed,
      # producing a Worker with schema that's a migration behind. The
      # `migrations list` subcommand is read-only against D1, so it
      # has no side effects on a healthy token; it only surfaces a
      # broken token before the destructive step runs.
      - name: Pre-deploy — verify D1 token scope
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: d1 migrations list ptowl-db --remote

      # Apply any pending D1 migrations BEFORE the new Worker code goes
      # live. wrangler skips migrations that are already applied, so this
      # is idempotent on every deploy. Without this step, schema changes
      # ship without a corresponding DB update and the new Worker breaks.
      - name: Apply D1 migrations (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: d1 migrations apply ptowl-db --remote

      - name: Deploy API to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy

      # Frontend deploy — REAL deploy path (not "fallback" anymore).
      #
      # History: this step originally landed as a fallback for when
      # Cloudflare Pages git integration was unreliable on 2026-05-05.
      # It was marked continue-on-error because wrangler-action would
      # intermittently fail to install wrangler when apps/web didn't
      # pin it locally — npm tripped on pnpm's `workspace:*` protocol
      # while trying `npm i wrangler@4`. The mask hid a real recurring
      # failure: PR #48's PTOwl rebrand merged but never reached
      # production because this step silently failed for three deploys
      # in a row.
      #
      # Now that wrangler@^4.86.0 is pinned in apps/web/package.json
      # (matches apps/api), the action finds it locally via
      # `npx --no-install wrangler` and skips the broken installer.
      # Continue-on-error removed so future failures surface
      # immediately instead of silently dropping frontend changes.
      - name: Deploy Frontend to Cloudflare Workers (static assets)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          wranglerVersion: '4'
          command: deploy
