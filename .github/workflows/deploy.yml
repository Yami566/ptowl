name: Deploy PtOwl

# Fires on push to main directly. The build + verify steps below act as the
# gate: if typecheck, tests, or build fail, the wrangler deploy steps
# never run — production stays on the previous version. workflow_dispatch
# is also enabled for manual re-runs from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://ptowl.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Self-gating: each of these steps fails the workflow if the
      # corresponding check fails, so wrangler never deploys broken code.
      - name: Typecheck (all workspaces)
        run: pnpm -r typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Build
        run: pnpm build

      # Apply any pending D1 migrations BEFORE the new Worker code goes
      # live. wrangler skips migrations that are already applied, so this
      # is idempotent on every deploy. Without this step, schema changes
      # ship without a corresponding DB update and the new Worker breaks.
      - name: Apply D1 migrations (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: d1 migrations apply ptowl-db --remote

      - name: Deploy API to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy

      - name: Deploy Frontend to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy dist --project-name ptowl
