name: Deploy PtOwl (API + D1 + Frontend)

# Frontend deploy was originally delegated to Cloudflare Workers Builds (the
# git-integrated successor to CF Pages projects). On 2026-05-05 that
# integration started failing with `wrangler` not finding the assets dir
# despite a valid apps/web/wrangler.jsonc. Rather than rely on dashboard
# config we don't fully control, we now deploy the frontend from this
# workflow too, using the same `CLOUDFLARE_API_TOKEN` we already trust for
# API + D1. CF Workers Builds may continue to run in parallel; whichever
# pushes last wins and both target the same `ptowl` Worker, so this is
# safe to leave alongside the existing dashboard integration.
#
# Build + typecheck + test gate every wrangler step so deploys never fire
# on broken code.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://ptowl.com

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Self-gating: each of these steps fails the workflow if the
      # corresponding check fails, so wrangler never deploys broken code.
      - name: Typecheck (all workspaces)
        run: pnpm -r typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Build
        run: pnpm build

      # Apply any pending D1 migrations BEFORE the new Worker code goes
      # live. wrangler skips migrations that are already applied, so this
      # is idempotent on every deploy. Without this step, schema changes
      # ship without a corresponding DB update and the new Worker breaks.
      - name: Apply D1 migrations (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: d1 migrations apply ptowl-db --remote

      - name: Deploy API to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy

      # Frontend deploy — REDUNDANT BACKUP, intentionally non-fatal.
      #
      # Why this step exists: on 2026-05-05 Cloudflare Pages git
      # integration started failing intermittently. We added this CI
      # step as a fallback path. Within hours CF Pages started working
      # again and has been deploying every push reliably (~60s after
      # the push).
      #
      # Why this step now has continue-on-error: apps/web/package.json
      # doesn't pin wrangler (apps/api does — `^4.86.0`). When
      # wrangler-action runs without a pin and without a local
      # node_modules wrangler, it can fail intermittently. That
      # failure used to fail the whole workflow → email spam → fake
      # "deploy failed" anxiety even though the actual frontend
      # deploy via CF Pages succeeded.
      #
      # The fix:
      #   - Pin wranglerVersion: '4' so the action always installs a
      #     known-good wrangler instead of guessing.
      #   - Mark continue-on-error: true so a failure here doesn't
      #     fail the workflow (CF Pages is the primary path; this
      #     step is a backup that only matters if CF Pages breaks).
      #
      # If you ever want to remove this step entirely (when you trust
      # CF Pages 100%), just delete the block. Nothing else depends
      # on it.
      - name: Deploy Frontend to Cloudflare Workers (static assets, redundant fallback)
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          wranglerVersion: '4'
          command: deploy
