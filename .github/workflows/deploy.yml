name: Deploy PtOwl (API + D1 + Frontend)

# Frontend deploy was originally delegated to Cloudflare Workers Builds (the
# git-integrated successor to CF Pages projects). On 2026-05-05 that
# integration started failing with `wrangler` not finding the assets dir
# despite a valid apps/web/wrangler.jsonc. Rather than rely on dashboard
# config we don't fully control, we now deploy the frontend from this
# workflow too, using the same `CLOUDFLARE_API_TOKEN` we already trust for
# API + D1. CF Workers Builds may continue to run in parallel; whichever
# pushes last wins and both target the same `ptowl` Worker, so this is
# safe to leave alongside the existing dashboard integration.
#
# Build + typecheck + test gate every wrangler step so deploys never fire
# on broken code.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://ptowl.com

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Self-gating: each of these steps fails the workflow if the
      # corresponding check fails, so wrangler never deploys broken code.
      - name: Typecheck (all workspaces)
        run: pnpm -r typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Build
        run: pnpm build

      # Apply any pending D1 migrations BEFORE the new Worker code goes
      # live. wrangler skips migrations that are already applied, so this
      # is idempotent on every deploy. Without this step, schema changes
      # ship without a corresponding DB update and the new Worker breaks.
      - name: Apply D1 migrations (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: d1 migrations apply ptowl-db --remote

      - name: Deploy API to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy

      # Frontend deploy. Reads apps/web/wrangler.jsonc and uploads ./dist
      # (produced by the earlier `pnpm build` step) as the static-asset
      # payload of the `ptowl` Worker. Replaces the Cloudflare Workers
      # Builds dashboard integration which was failing intermittently
      # without surfacing a fixable error.
      - name: Deploy Frontend to Cloudflare Workers (static assets)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy
