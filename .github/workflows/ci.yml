name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install deps
        # Dependabot PRs frequently land with pnpm-lock.yaml drift —
        # the bot bumps package.json in one workspace but doesn't
        # always regenerate the root lockfile entries that pnpm's
        # frozen-lockfile check requires. Result pre-fix: every
        # Dependabot PR failed all 5 CI jobs (5 emails × ~4 PRs/week).
        # Skipping --frozen-lockfile for the bot lets the install
        # reconcile the lockfile in place; human PRs keep the strict
        # check to catch accidental drift.
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            pnpm install --no-frozen-lockfile
          else
            pnpm install --frozen-lockfile
          fi
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install deps
        # Dependabot PRs frequently land with pnpm-lock.yaml drift —
        # the bot bumps package.json in one workspace but doesn't
        # always regenerate the root lockfile entries that pnpm's
        # frozen-lockfile check requires. Result pre-fix: every
        # Dependabot PR failed all 5 CI jobs (5 emails × ~4 PRs/week).
        # Skipping --frozen-lockfile for the bot lets the install
        # reconcile the lockfile in place; human PRs keep the strict
        # check to catch accidental drift.
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            pnpm install --no-frozen-lockfile
          else
            pnpm install --frozen-lockfile
          fi
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install deps
        # Dependabot PRs frequently land with pnpm-lock.yaml drift —
        # the bot bumps package.json in one workspace but doesn't
        # always regenerate the root lockfile entries that pnpm's
        # frozen-lockfile check requires. Result pre-fix: every
        # Dependabot PR failed all 5 CI jobs (5 emails × ~4 PRs/week).
        # Skipping --frozen-lockfile for the bot lets the install
        # reconcile the lockfile in place; human PRs keep the strict
        # check to catch accidental drift.
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            pnpm install --no-frozen-lockfile
          else
            pnpm install --frozen-lockfile
          fi
      - run: pnpm test:unit

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install deps
        # Dependabot PRs frequently land with pnpm-lock.yaml drift —
        # the bot bumps package.json in one workspace but doesn't
        # always regenerate the root lockfile entries that pnpm's
        # frozen-lockfile check requires. Result pre-fix: every
        # Dependabot PR failed all 5 CI jobs (5 emails × ~4 PRs/week).
        # Skipping --frozen-lockfile for the bot lets the install
        # reconcile the lockfile in place; human PRs keep the strict
        # check to catch accidental drift.
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            pnpm install --no-frozen-lockfile
          else
            pnpm install --frozen-lockfile
          fi
      - run: pnpm build

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install deps
        # Dependabot PRs frequently land with pnpm-lock.yaml drift —
        # the bot bumps package.json in one workspace but doesn't
        # always regenerate the root lockfile entries that pnpm's
        # frozen-lockfile check requires. Result pre-fix: every
        # Dependabot PR failed all 5 CI jobs (5 emails × ~4 PRs/week).
        # Skipping --frozen-lockfile for the bot lets the install
        # reconcile the lockfile in place; human PRs keep the strict
        # check to catch accidental drift.
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            pnpm install --no-frozen-lockfile
          else
            pnpm install --frozen-lockfile
          fi
      - name: Validate PR commits
        run: pnpm commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
