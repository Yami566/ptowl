# PTOWL CI/CD Pipeline — Google Cloud Build
# Triggers on push to main: test → build → deploy to Cloudflare
#
# Prerequisites:
#   1. Enable APIs: cloudbuild.googleapis.com, secretmanager.googleapis.com
#   2. Store CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in Secret Manager
#   3. Grant Cloud Build service account secretmanager.secretAccessor role

steps:
  # Step 1: Install dependencies
  - name: 'node:20'
    id: 'install'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g pnpm@9
        pnpm install --frozen-lockfile

  # Step 2: Run all tests (shared + API + web = 687 tests)
  - name: 'node:20'
    id: 'test'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g pnpm@9
        pnpm test
    waitFor: ['install']

  # Step 3: Build all packages (shared → API + web)
  - name: 'node:20'
    id: 'build'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g pnpm@9
        pnpm build
    waitFor: ['test']

  # Step 4: Deploy API Worker to Cloudflare
  - name: 'node:20'
    id: 'deploy-api'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g wrangler
        cd apps/api
        wrangler deploy
    secretEnv: ['CLOUDFLARE_API_TOKEN', 'CLOUDFLARE_ACCOUNT_ID']
    waitFor: ['build']

  # Step 5: Deploy Frontend to Cloudflare Pages
  - name: 'node:20'
    id: 'deploy-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g wrangler
        wrangler pages deploy apps/web/dist --project-name ptowl
    secretEnv: ['CLOUDFLARE_API_TOKEN', 'CLOUDFLARE_ACCOUNT_ID']
    waitFor: ['build']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/CLOUDFLARE_API_TOKEN/versions/latest
      env: 'CLOUDFLARE_API_TOKEN'
    - versionName: projects/$PROJECT_ID/secrets/CLOUDFLARE_ACCOUNT_ID/versions/latest
      env: 'CLOUDFLARE_ACCOUNT_ID'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '600s'
