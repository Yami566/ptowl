# PTOWL CI/CD Pipeline — Google Cloud Build
# Triggers on push to main: test → build → deploy staging → deploy production
# Connected: GitHub → Cloud Build → Cloudflare (Workers + Pages)
#
# Prerequisites:
#   1. Enable APIs: cloudbuild.googleapis.com, secretmanager.googleapis.com
#   2. Store CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in Secret Manager
#   3. Grant Cloud Build service account secretmanager.secretAccessor role

steps:
  # Step 1: Install dependencies
  - name: 'node:20'
    id: 'install'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g pnpm@9
        pnpm install --frozen-lockfile

  # Step 1.5: Security audit (runs in parallel with tests)
  - name: 'node:20'
    id: 'security-audit'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g pnpm@9
        pnpm audit --prod --audit-level=high || true
    waitFor: ['install']

  # Step 2: Run all unit tests
  - name: 'node:20'
    id: 'test'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g pnpm@9
        pnpm test
    waitFor: ['install']

  # Step 3: Build all packages (shared → API + web)
  - name: 'node:20'
    id: 'build'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g pnpm@9
        pnpm build
    waitFor: ['test', 'security-audit']

  # Step 4: Deploy API Worker to Cloudflare (staging first)
  - name: 'node:20'
    id: 'deploy-api-staging'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g wrangler
        cd apps/api
        wrangler deploy --env staging
    secretEnv: ['CLOUDFLARE_API_TOKEN', 'CLOUDFLARE_ACCOUNT_ID']
    waitFor: ['build']

  # Step 5: Deploy API Worker to Cloudflare (production)
  - name: 'node:20'
    id: 'deploy-api'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g wrangler
        cd apps/api
        wrangler deploy
    secretEnv: ['CLOUDFLARE_API_TOKEN', 'CLOUDFLARE_ACCOUNT_ID']
    waitFor: ['deploy-api-staging']

  # Step 6: Deploy Frontend to Cloudflare Pages
  # Runs from apps/web/ so wrangler auto-detects the functions/ directory
  # for edge middleware (auth guard runs before any HTML is served)
  - name: 'node:20'
    id: 'deploy-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g wrangler
        cd apps/web
        wrangler pages deploy dist --project-name ptowl
    secretEnv: ['CLOUDFLARE_API_TOKEN', 'CLOUDFLARE_ACCOUNT_ID']
    waitFor: ['deploy-api']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/CLOUDFLARE_API_TOKEN/versions/latest
      env: 'CLOUDFLARE_API_TOKEN'
    - versionName: projects/$PROJECT_ID/secrets/CLOUDFLARE_ACCOUNT_ID/versions/latest
      env: 'CLOUDFLARE_ACCOUNT_ID'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '600s'
