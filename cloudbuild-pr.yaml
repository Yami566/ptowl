# PTOWL PR Validation Pipeline — Google Cloud Build
# Triggers on PR to main: install → test only (no deploy)

steps:
  # Install dependencies
  - name: 'node:20'
    id: 'install'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g pnpm@9
        pnpm install --frozen-lockfile

  # Run all tests
  - name: 'node:20'
    id: 'test'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g pnpm@9
        pnpm test
    waitFor: ['install']

  # Type check
  - name: 'node:20'
    id: 'typecheck'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g pnpm@9
        pnpm typecheck
    waitFor: ['install']

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '300s'
